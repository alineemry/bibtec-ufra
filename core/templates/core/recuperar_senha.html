<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - BIBTEC</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #B8D8BE;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background-color: #A3C9AD;
            border: 1.5px solid #1E4D12;
            border-radius: 14px;
            box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.18);
            padding: 28px 24px;
        }

        h1, h2 {
            text-align: center;
            color: #1E4D12;
        }

        h1 {
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            color: #1E4D12;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            height: 44px;
            padding: 10px 12px;
            border: none;
            border-radius: 8px;
            background-color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            height: 44px;
            margin-top: 16px;
            border: none;
            border-radius: 8px;
            background-color: #1B4314;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #1E4D12;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .errorlist {
            color: #631A1A;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>BIBTEC</h1>
        <h2>Recuperar Senha</h2>
        <p>Informe o e-mail cadastrado para receber o link de redefinição.</p>

        <form method="post" id="form-recuperar">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Enviar e-mail de recuperação</button>
        </form>

        <a href="{% url 'login' %}">Voltar para o login</a>
    </div>

    <script>
        document.getElementById('form-recuperar').addEventListener('submit', function(e) {
            const botao = this.querySelector('button[type="submit"]');
            const textoOriginal = botao.innerText;
            botao.innerText = 'Enviando...';
            botao.disabled = true;
            
            // Restaurar após 2 segundos 
            // setTimeout(function() {
            //     botao.innerText = textoOriginal;
            //     botao.disabled = false;
            // }, 2000);
        });
    </script>
</body>
</html>
