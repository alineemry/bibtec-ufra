<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - BIBTEC</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #B8D8BE;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background-color: #A3C9AD;
            border: 1.5px solid #1E4D12;
            border-radius: 14px;
            box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.18);
            padding: 28px 24px;
        }

        h1, h2 {
            text-align: center;
            color: #1E4D12;
        }

        h1 {
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        p {
            text-align: center;
            color: #1E4D12;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            height: 44px;
            padding: 10px 12px;
            border: none;
            border-radius: 8px;
            background-color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            height: 44px;
            margin-top: 16px;
            border: none;
            border-radius: 8px;
            background-color: #1B4314;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #1E4D12;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .errorlist {
            color: #631A1A;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="secao-login" style="max-width: 500px; margin: 0 auto; text-align: center;">
        <h2>Recuperação de senha</h2>
        
        <div style="background-color: #fff3cd; border: 1px solid #ffecb5; border-radius: 8px; padding: 20px; margin: 20px 0;">
            <p style="color: #856404; margin-bottom: 15px;">
                A funcionalidade de recuperação de senha está temporariamente indisponível nesta versão de teste.
            </p>
            <p style="color: #856404;">
                Para fins de avaliação do sistema, entre em contato com o administrador para redefinir sua senha.
            </p>
        </div>
        
        <div style="margin-top: 20px;">
            <a href="{% url 'login' %}">
                <button class="btn-primary">Voltar para o login</button>
            </a>
        </div>
    </div>

    <style>
        .btn-primary {
            background-color: #1f5a16;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px 24px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary:hover {
            background-color: #174410;
        }
    </style>
</body>
</html>
